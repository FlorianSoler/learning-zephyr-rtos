# --- Système de base et Réseau ---
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_DRIVERS=y

# --- Pile IP (IPv4) ---
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y

# --- Pile PPP (Liaison réseau) ---
CONFIG_NET_L2_PPP=y
CONFIG_NET_PPP=y

# --- Configuration du Driver Modem Générique GSM ---
CONFIG_MODEM=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_MODEM_GSM_APN="tm"
CONFIG_MODEM_LOG_LEVEL_DBG=y

# --- Allocation des buffers réseau (Essentiel pour le trafic PPP) ---
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20

# --- Traces de debug (Pour voir l'échange AT et PPP dans la console) ---
CONFIG_NET_LOG=y
CONFIG_MODEM_LOG_LEVEL_DBG=y



CONFIG_BUILD_OUTPUT_UF2=y
