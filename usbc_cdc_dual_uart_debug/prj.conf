# 1. Force OFF the new Zephyr 4.x USB stack and its UDC driver
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_UDC_DRIVER=n

# 2. Force ON the legacy Nordic USB driver
# 3. Enable the legacy USB Device Stack
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# 4. Serial and Console configurations
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

CONFIG_BUILD_OUTPUT_UF2=y